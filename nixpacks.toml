# Railway / Nixpacks build config
# Puppeteer needs the Chromium browser plus a handful of system libs at runtime.
# These nixpkgs install them globally so Puppeteer's bundled Chromium launches cleanly.

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "fontconfig",
  "freetype",
  "harfbuzz",
  "ca-certificates"
]

[variables]
# Tell Puppeteer to use the system Chromium provided by Nix instead of
# downloading its own copy at install time (saves ~170MB and avoids 403s).
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/var/nix/profiles/default/bin/chromium"

[start]
cmd = "node server.js"
