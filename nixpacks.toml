# Railway / Nixpacks config — installs Chromium browser + libs Puppeteer needs.

[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = [
  "chromium-browser",
  "fonts-liberation",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libgbm1",
  "libasound2t64",
  "libpangocairo-1.0-0",
  "libxss1",
  "libgtk-3-0",
  "libxshmfence1",
  "libglu1-mesa",
  "ca-certificates"
]

[phases.install]
cmds = ["npm install --omit=dev=false"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"

[start]
cmd = "node server.js"
